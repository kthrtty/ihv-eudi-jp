<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IVH Verifier — Digital Credentials API デモ</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 16px/1.6 system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  button { font: inherit; padding: .6rem 1rem; border-radius: .5rem; border: 1px solid #888; cursor: pointer; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1rem 0; }
  pre { background: #00000010; padding: 1rem; border-radius: .5rem; overflow: auto; white-space: pre-wrap; }
  .ok { color: #1a7f37; } .ng { color: #cf222e; } .muted { color: #888; }
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
  <span style="width:8px;height:22px;border-radius:3px;background:#9E3A3A;display:inline-block"></span>
  <h1 style="margin:0">検証者 (Verifier) — 本人確認（DC API デモ）</h1>
  <span style="margin-left:auto;font-size:12px;font-weight:700;color:#9E3A3A;background:#F6ECEC;border:1px solid #E7D6D6;padding:4px 11px;border-radius:999px">検証者 · VERIFIER</span>
</div>
<p class="muted">
  ブラウザ/エミュレータ専用。Annex D（OID4VP over Digital Credentials API）。
  Safari は <code>org-iso-mdoc</code>（Annex C）のみ対応のため、ここでは未対応として扱います。
</p>

<div class="row">
  <button id="pid">PID を要求（mdoc）</button>
  <button id="qual">国家資格 を要求（mdoc）</button>
</div>

<p id="status" class="muted">準備完了。ユーザー操作（ボタン）起点で DC API を呼び出します。</p>
<pre id="out"></pre>

<script type="module">
const status = document.getElementById('status');
const out = document.getElementById('out');
const PROTOCOL = 'openid4vp-v1-unsigned'; // Annex D。署名要求なら -signed

function supported() {
  return typeof window.DigitalCredential !== 'undefined'
    && DigitalCredential.userAgentAllowsProtocol?.(PROTOCOL);
}

async function flow(specs) {
  out.textContent = '';
  if (!supported()) {
    status.innerHTML = '<span class="ng">このブラウザは ' + PROTOCOL
      + ' に未対応です（Chrome 141+ / Android、または非DC-APIのリダイレクト経路にフォールバックしてください）。</span>';
    return;
  }
  try {
    // 1) Verifier バックエンドから OID4VP リクエストを取得
    status.textContent = 'リクエスト生成中…';
    const reqRes = await fetch('/vp/request', {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ specs }),
    });
    const { transactionId, request } = await reqRes.json();

    // 2) DC API でウォレットに提示要求（必ずユーザー操作起点・セキュアコンテキスト）
    status.textContent = 'ウォレットを呼び出し中…';
    const credential = await navigator.credentials.get({
      mediation: 'required',
      digital: { requests: [{ protocol: PROTOCOL, data: request }] },
    });

    // 3) 暗号化された vp_token を Verifier バックエンドへ（復号・検証はサーバ側）
    status.textContent = '検証中…';
    const data = credential.data ?? credential; // 実装差を吸収
    const encryptedResponse = typeof data === 'string' ? data : (data.response ?? JSON.stringify(data));
    const verRes = await fetch('/vp/verify', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ transactionId, encryptedResponse }),
    });
    const result = await verRes.json();

    status.innerHTML = result.valid
      ? '<span class="ok">検証成功</span>'
      : '<span class="ng">検証失敗</span>';
    out.textContent = JSON.stringify(result, null, 2);
  } catch (e) {
    status.innerHTML = '<span class="ng">エラー: ' + (e?.message ?? e) + '</span>';
  }
}

document.getElementById('pid').addEventListener('click', () => flow([
  { id: 'pid', configId: 'pid_mdoc', claims: ['family_name', 'given_name', 'age_over_18'] },
]));
document.getElementById('qual').addEventListener('click', () => flow([
  { id: 'qual', configId: 'qualification_mdoc', claims: ['qualification_name', 'competent_authority'] },
]));
</script>
</body>
</html>
