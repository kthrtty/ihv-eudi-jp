name = "issuer"
main = "src/worker-issuer.mjs"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ISSUER_URL         = "https://issuer.example.test"
VERIFIER_ORIGIN    = "https://verifier.example.test"
WALLET_ORIGIN      = "https://web-wallet.example.test"
# Open-redirector guard: authorization redirect_uri allowlist (space/comma-separated).
# Placeholder only; real origins are injected by `npm run deploy` (scripts/deploy.mjs).
REDIRECT_URI_ALLOWLIST = "https://issuer.example.test/demo/cb https://web-wallet.example.test/oidc/cb"

# Secrets (set once with `wrangler secret put`):
#   ISSUER_PKI_JSON  — node scripts/gen-worker-pki.mjs | wrangler secret put ISSUER_PKI_JSON

[[kv_namespaces]]
binding = "IHV_KV"
id      = "84ba206f1832417ea3dcfc0db2960d6d"

[assets]
directory = "web"
