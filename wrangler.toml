name = "issuer"
main = "src/worker-issuer.mjs"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ISSUER_URL         = "https://issuer.kthrtty.workers.dev"
VERIFIER_ORIGIN    = "https://verifier.kthrtty.workers.dev"
WALLET_ORIGIN      = "https://web-wallet.kthrtty.workers.dev"

# Secrets (set once with `wrangler secret put`):
#   ISSUER_PKI_JSON  — node scripts/gen-worker-pki.mjs | wrangler secret put ISSUER_PKI_JSON

[[kv_namespaces]]
binding = "IHV_KV"
id      = "84ba206f1832417ea3dcfc0db2960d6d"

[assets]
directory = "web"
