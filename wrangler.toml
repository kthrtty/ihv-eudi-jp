name = "issuer"
main = "src/worker-issuer.mjs"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ISSUER_URL         = "https://issuer.example.test"
VERIFIER_ORIGIN    = "https://verifier.example.test"
WALLET_ORIGIN      = "https://web-wallet.example.test"

# Secrets (set once with `wrangler secret put`):
#   ISSUER_PKI_JSON  — node scripts/gen-worker-pki.mjs | wrangler secret put ISSUER_PKI_JSON

[[kv_namespaces]]
binding = "IHV_KV"
id      = "REPLACE_WITH_KV_NAMESPACE_ID"

[assets]
directory = "web"
