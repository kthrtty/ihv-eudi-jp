name = "ihv-eudi-jp"
main = "src/worker.mjs"
compatibility_date = "2025-09-01"
# node:crypto is fully supported under nodejs_compat (incl. ES256, createHash,
# randomBytes, EC P-256, X509Certificate). No WebCrypto rewrite needed. See deploy doc.
compatibility_flags = ["nodejs_compat"]

[vars]
ISSUER_URL = "https://ihv-eudi-jp.example.workers.dev"

# Secrets (set with `wrangler secret put`):
#   ISSUER_PKI_JSON  — JSON blob generated by `node scripts/gen-worker-pki.mjs`
#                       contains all mdoc DSC/IACA, SD-JWT issuer/CA, verifier enc key.
#                       See scripts/gen-worker-pki.mjs for the exact schema.

# Create with: wrangler kv namespace create IHV_KV   (then paste the id below)
[[kv_namespaces]]
binding = "IHV_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Static assets: web/*.html served at /issuer.html and /verifier.html.
# Worker routes redirect / and /demo/verify there when no HTML string is injected.
[assets]
directory = "web"
